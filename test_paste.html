<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>붙여넣기 테스트</title>
<style>
body{font-family:'Noto Sans KR',sans-serif;padding:30px;background:#f5f5f5}
.box{background:white;border-radius:12px;padding:24px;max-width:500px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
h2{margin-top:0;color:#534AB7}
.btn{display:inline-block;padding:10px 20px;border-radius:8px;border:none;font-size:14px;cursor:pointer;margin:6px 4px;font-family:inherit}
.btn-purple{background:#534AB7;color:white}
.btn-green{background:#0F6E56;color:white}
textarea{width:100%;height:80px;border-radius:8px;border:1.5px solid #ddd;padding:10px;font-size:13px;box-sizing:border-box;margin:8px 0}
#preview{margin-top:12px;display:none}
#preview img{max-width:100%;border-radius:8px;border:1.5px solid #ddd}
#status{margin-top:10px;padding:8px 14px;border-radius:8px;font-size:13px;display:none}
.ok{background:#e8f8f4;color:#0F6E56}
.err{background:#fce8e8;color:#A32D2D}
</style>
</head>
<body>
<div class="box">
  <h2>📋 이미지 붙여넣기 테스트</h2>

  <p style="font-size:13px;color:#666">아래 방법 중 작동하는 것을 확인해주세요:</p>

  <hr>
  <h3 style="font-size:14px">방법 1: textarea에 Ctrl+V</h3>
  <p style="font-size:12px;color:#666">아래 칸을 클릭 후 이미지 Ctrl+V</p>
  <textarea id="ta" placeholder="여기 클릭 후 Ctrl+V" onpaste="handleTaPaste(event)"></textarea>

  <hr>
  <h3 style="font-size:14px">방법 2: 버튼 클릭 (Clipboard API)</h3>
  <button class="btn btn-purple" onclick="tryClipboardAPI()">📋 클립보드에서 이미지 가져오기</button>

  <hr>
  <h3 style="font-size:14px">방법 3: 파일 선택</h3>
  <input type="file" accept="image/*" onchange="handleFile(this)">

  <div id="status"></div>
  <div id="preview"><img id="previewImg"></div>
</div>

<script>
function show(msg, type){
  const s=document.getElementById('status');
  s.textContent=msg; s.className=type; s.style.display='block';
}
function showImg(b64){
  document.getElementById('previewImg').src=b64;
  document.getElementById('preview').style.display='block';
}

// Method 1: textarea paste
function handleTaPaste(e){
  const items=[...(e.clipboardData?.items||[])];
  const imgItem=items.find(i=>i.type.startsWith('image/'));
  if(imgItem){
    e.preventDefault();
    const file=imgItem.getAsFile();
    const reader=new FileReader();
    reader.onload=ev=>{showImg(ev.target.result);show('방법1 성공! textarea paste 작동','ok');};
    reader.readAsDataURL(file);
  } else {
    show('방법1: 클립보드에 이미지 없음 (텍스트만 있거나 이미지 복사 안 됨)','err');
  }
}

// Method 2: Clipboard API
async function tryClipboardAPI(){
  try{
    const items=await navigator.clipboard.read();
    let found=false;
    for(const item of items){
      const imgType=item.types.find(t=>t.startsWith('image/'));
      if(imgType){
        const blob=await item.getType(imgType);
        const reader=new FileReader();
        reader.onload=ev=>{showImg(ev.target.result);show('방법2 성공! Clipboard API 작동','ok');};
        reader.readAsDataURL(blob);
        found=true; break;
      }
    }
    if(!found) show('방법2: 클립보드에 이미지 없음','err');
  }catch(err){
    show('방법2 실패: '+err.message,'err');
  }
}

// Method 3: file input
function handleFile(inp){
  if(!inp.files[0]) return;
  const reader=new FileReader();
  reader.onload=ev=>{showImg(ev.target.result);show('방법3 성공! 파일 선택 작동','ok');};
  reader.readAsDataURL(inp.files[0]);
}
</script>
</body>
</html>
